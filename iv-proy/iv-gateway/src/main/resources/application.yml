info:
 component: iv-gateway

spring:
  application:
    name: iv-gateway
    
server:
  port: 7000

zuul:
  # Esto ignora encabezados de seguridad que puedan venir de los servicios de atrás
  ignored-headers: Access-Control-Allow-Credentials, Access-Control-Allow-Origin, Access-Control-Allow-Methods, Access-Control-Allow-Headers
  sensitive-headers: Cookie,Set-Cookie

  routes:
    serv-jpa-destinos:
        path: /iv-jpa-destinos/**
        serviceId: iv-jpa-destinos
    serv-neg-viajes:
        path: /iv-service-viajes/**
        serviceId: iv-service-viajes
        stripPrefix: false
    serv-sec-token:
      path: /auth/**
      serviceId: iv-service-token
      stripPrefix: false

# Tiempos de espera para el balanceador Ribbon (Muy importante)
ribbon:
  ReadTimeout: 60000
  ConnectTimeout: 15000
  MaxAutoRetries: 0
  MaxAutoRetriesNextServer: 1

# Si usas Hystrix (que viene por defecto con Zuul antiguo)
hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 60000
 
#Eureka Configuration Properties
eureka: 
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
