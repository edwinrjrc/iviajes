server:
  port: 8888

spring:
  application:
    name: iv-config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:D:/claves
  
  security:
    user:
      name: iv-admin
      password: iv-admin

eureka:
  client:
    # Cambia estos dos a 'true'
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/